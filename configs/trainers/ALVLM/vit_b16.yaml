DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 32
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 8

INPUT:
  SIZE: (224, 224)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]

OPTIM:
  NAME: "sgd"
  LR: 0.002
  MAX_EPOCH: 200
  LR_SCHEDULER: "cosine"

TRAIN:
  PRINT_FREQ: 5

MODEL:
  BACKBONE:
    NAME: "ViT-B/16"

# TPAMI 扩展默认项（可被命令行 TRAINER.COOPAL.* 覆盖；节点由 train.extend_cfg 预创建）
TRAINER:
  COOPAL:
    SAE_CA:
      Q_FIXED_PI: false
      USE_KCENTER: false
      TOPM_RATIO: 10.0
    EGSF:
      NAIVE_FT: false